<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" fill="none">
  <style>
    .logo-text { font-family: 'Great Vibes', cursive; font-size: 48px; fill: currentColor; }
    .subtitle { font-family: sans-serif; font-size: 10px; fill: #a0a0a0; letter-spacing: 0.3em; text-transform: uppercase; }
    .heart { fill: #e8b4b8; }
  </style>
  
  <!-- Main text: Bryt's Bl -->
  <text x="10" y="50" class="logo-text">Bryt's Bl</text>
  
  <!-- The "i" without dot -->
  <text x="175" y="50" class="logo-text" style="font-size: 48px;">ı</text>
  
  <!-- Heart as the dot -->
  <path class="heart" d="M182 22 c-1.5-1.5-4-1.5-5.5 0 c-1.5 1.5-1.5 4 0 5.5 l5.5 5.5 l5.5-5.5 c1.5-1.5 1.5-4 0-5.5 c-1.5-1.5-4-1.5-5.5 0" transform="translate(0, 2) scale(0.8)"/>
  
  <!-- Rest: ngz -->
  <text x="185" y="50" class="logo-text">ngz</text>
  
  <!-- Subtitle -->
  <text x="75" y="70" class="subtitle">Piercing Stylist</text>
</svg>

