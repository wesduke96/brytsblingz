{# Add new client form — loaded into #newClientZone via HTMX #}
<div class="p-5 border border-bryt-pink/30 bg-bryt-pink/5 mb-4">
    <p class="text-xs tracking-[0.3em] uppercase text-bryt-gray mb-4">New Client</p>
    <form
        hx-post="/admin/clients/new"
        hx-target="#clientsList"
        hx-swap="afterbegin"
        hx-on::after-request="if(event.detail.successful) { document.getElementById('newClientZone').innerHTML=''; }"
        class="space-y-4">

        <div class="grid md:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs text-bryt-gray mb-1">Name</label>
                <input type="text" name="name" required
                       class="w-full px-3 py-2 bg-bryt-charcoal/50 border border-bryt-charcoal text-bryt-white text-sm focus:border-bryt-silver focus:outline-none transition-colors"
                       placeholder="Full name">
            </div>
            <div>
                <label class="block text-xs text-bryt-gray mb-1">Phone</label>
                <input type="tel" name="phone"
                       class="w-full px-3 py-2 bg-bryt-charcoal/50 border border-bryt-charcoal text-bryt-white text-sm focus:border-bryt-silver focus:outline-none transition-colors"
                       placeholder="(555) 555-5555">
            </div>
            <div class="md:col-span-2">
                <label class="block text-xs text-bryt-gray mb-1">Email</label>
                <input type="email" name="email" required
                       class="w-full px-3 py-2 bg-bryt-charcoal/50 border border-bryt-charcoal text-bryt-white text-sm focus:border-bryt-silver focus:outline-none transition-colors"
                       placeholder="client@email.com">
            </div>
            <div class="md:col-span-2">
                <label class="block text-xs text-bryt-gray mb-1">Notes (optional)</label>
                <textarea name="notes" rows="2"
                          class="w-full px-3 py-2 bg-bryt-charcoal/50 border border-bryt-charcoal text-bryt-white text-sm focus:border-bryt-silver focus:outline-none transition-colors resize-none"
                          placeholder="Internal notes..."></textarea>
            </div>
        </div>

        <div class="flex gap-3">
            <button type="submit"
                    class="px-5 py-2 bg-bryt-pink text-bryt-black text-xs tracking-wider uppercase hover:bg-bryt-blush transition-colors">
                Add Client
            </button>
            <button type="button"
                    onclick="document.getElementById('newClientZone').innerHTML=''"
                    class="px-5 py-2 border border-bryt-charcoal text-bryt-gray text-xs tracking-wider uppercase hover:text-bryt-silver transition-colors">
                Cancel
            </button>
        </div>
    </form>
</div>
