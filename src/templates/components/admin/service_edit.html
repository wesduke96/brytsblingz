{# Inline edit form for a service #}
{% set categories = ["Ear", "Nose", "Face", "Oral", "Body", "Surface", "Other"] %}
<form
    hx-post="/admin/services/{{ service.id }}/edit"
    hx-target="#service-{{ service.id }}"
    hx-swap="outerHTML"
    class="p-5 border-t border-bryt-charcoal bg-bryt-charcoal/30 space-y-4">

    <div class="grid md:grid-cols-3 gap-4">
        <div class="md:col-span-2">
            <label class="block text-xs text-bryt-gray mb-1">Name</label>
            <input type="text" name="name" value="{{ service.name }}" required
                   class="w-full px-3 py-2 bg-bryt-charcoal/50 border border-bryt-charcoal text-bryt-white text-sm focus:border-bryt-silver focus:outline-none transition-colors">
        </div>
        <div>
            <label class="block text-xs text-bryt-gray mb-1">Category</label>
            <select name="category"
                    class="w-full px-3 py-2 bg-bryt-charcoal/50 border border-bryt-charcoal text-bryt-white text-sm focus:border-bryt-silver focus:outline-none transition-colors">
                {% for cat in categories %}
                <option value="{{ cat }}" {% if service.category == cat %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="md:col-span-3">
            <label class="block text-xs text-bryt-gray mb-1">Description</label>
            <textarea name="description" rows="2"
                      class="w-full px-3 py-2 bg-bryt-charcoal/50 border border-bryt-charcoal text-bryt-white text-sm focus:border-bryt-silver focus:outline-none transition-colors resize-none">{{ service.description or '' }}</textarea>
        </div>
        <div>
            <label class="block text-xs text-bryt-gray mb-1">Price ($)</label>
            <input type="number" name="price" value="{{ service.price }}" step="0.01" min="0" required
                   class="w-full px-3 py-2 bg-bryt-charcoal/50 border border-bryt-charcoal text-bryt-white text-sm focus:border-bryt-silver focus:outline-none transition-colors">
        </div>
        <div>
            <label class="block text-xs text-bryt-gray mb-1">Pair Price ($) <span class="text-bryt-gray/60">optional</span></label>
            <input type="number" name="pair_price" value="{{ service.pair_price or '' }}" step="0.01" min="0"
                   class="w-full px-3 py-2 bg-bryt-charcoal/50 border border-bryt-charcoal text-bryt-white text-sm focus:border-bryt-silver focus:outline-none transition-colors">
        </div>
        <div>
            <label class="block text-xs text-bryt-gray mb-1">Duration (min)</label>
            <input type="number" name="duration_minutes" value="{{ service.duration_minutes }}" min="1" required
                   class="w-full px-3 py-2 bg-bryt-charcoal/50 border border-bryt-charcoal text-bryt-white text-sm focus:border-bryt-silver focus:outline-none transition-colors">
        </div>
        <div class="md:col-span-2">
            <label class="block text-xs text-bryt-gray mb-1">Image URL <span class="text-bryt-gray/60">optional</span></label>
            <input type="text" name="image_url" value="{{ service.image_url or '' }}"
                   class="w-full px-3 py-2 bg-bryt-charcoal/50 border border-bryt-charcoal text-bryt-white text-sm focus:border-bryt-silver focus:outline-none transition-colors"
                   placeholder="/static/images/piercings/example.jpg">
        </div>
        <div class="flex items-end pb-1">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" name="is_active" value="1" {% if service.is_active %}checked{% endif %}
                       class="w-4 h-4 accent-bryt-pink">
                <span class="text-sm text-bryt-silver">Active</span>
            </label>
        </div>
    </div>

    <div class="flex gap-3">
        <button type="submit"
                class="px-5 py-2 bg-bryt-pink text-bryt-black text-xs tracking-wider uppercase hover:bg-bryt-blush transition-colors">
            Save
        </button>
        <button type="button"
                hx-get="/admin/services/{{ service.id }}/cancel-edit"
                hx-target="#service-{{ service.id }}-edit"
                hx-swap="innerHTML"
                class="px-5 py-2 border border-bryt-charcoal text-bryt-gray text-xs tracking-wider uppercase hover:text-bryt-silver transition-colors">
            Cancel
        </button>
    </div>
</form>
