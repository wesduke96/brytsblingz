{# Add new service form — loaded into #newServiceZone #}
{% set categories = ["Ear", "Nose", "Face", "Oral", "Body", "Surface", "Other"] %}
<div class="p-5 border border-bryt-pink/30 bg-bryt-pink/5 mb-4">
    <p class="text-xs tracking-[0.3em] uppercase text-bryt-gray mb-4">New Service</p>
    <form
        hx-post="/admin/services/new"
        hx-target="#servicesList"
        hx-swap="afterbegin"
        hx-on::after-request="if(event.detail.successful) { document.getElementById('newServiceZone').innerHTML=''; }"
        class="space-y-4">

        <div class="grid md:grid-cols-3 gap-4">
            <div class="md:col-span-2">
                <label class="block text-xs text-bryt-gray mb-1">Name</label>
                <input type="text" name="name" required
                       class="w-full px-3 py-2 bg-bryt-charcoal/50 border border-bryt-charcoal text-bryt-white text-sm focus:border-bryt-silver focus:outline-none transition-colors"
                       placeholder="e.g. Lobe Piercing">
            </div>
            <div>
                <label class="block text-xs text-bryt-gray mb-1">Category</label>
                <select name="category"
                        class="w-full px-3 py-2 bg-bryt-charcoal/50 border border-bryt-charcoal text-bryt-white text-sm focus:border-bryt-silver focus:outline-none transition-colors">
                    {% for cat in categories %}
                    <option value="{{ cat }}">{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="md:col-span-3">
                <label class="block text-xs text-bryt-gray mb-1">Description</label>
                <textarea name="description" rows="2"
                          class="w-full px-3 py-2 bg-bryt-charcoal/50 border border-bryt-charcoal text-bryt-white text-sm focus:border-bryt-silver focus:outline-none transition-colors resize-none"
                          placeholder="Brief service description..."></textarea>
            </div>
            <div>
                <label class="block text-xs text-bryt-gray mb-1">Price ($)</label>
                <input type="number" name="price" step="0.01" min="0" required
                       class="w-full px-3 py-2 bg-bryt-charcoal/50 border border-bryt-charcoal text-bryt-white text-sm focus:border-bryt-silver focus:outline-none transition-colors"
                       placeholder="45">
            </div>
            <div>
                <label class="block text-xs text-bryt-gray mb-1">Pair Price ($) <span class="text-bryt-gray/60">optional</span></label>
                <input type="number" name="pair_price" step="0.01" min="0"
                       class="w-full px-3 py-2 bg-bryt-charcoal/50 border border-bryt-charcoal text-bryt-white text-sm focus:border-bryt-silver focus:outline-none transition-colors"
                       placeholder="70">
            </div>
            <div>
                <label class="block text-xs text-bryt-gray mb-1">Duration (min)</label>
                <input type="number" name="duration_minutes" value="30" min="1" required
                       class="w-full px-3 py-2 bg-bryt-charcoal/50 border border-bryt-charcoal text-bryt-white text-sm focus:border-bryt-silver focus:outline-none transition-colors">
            </div>
            <div class="md:col-span-2">
                <label class="block text-xs text-bryt-gray mb-1">Image URL <span class="text-bryt-gray/60">optional</span></label>
                <input type="text" name="image_url"
                       class="w-full px-3 py-2 bg-bryt-charcoal/50 border border-bryt-charcoal text-bryt-white text-sm focus:border-bryt-silver focus:outline-none transition-colors"
                       placeholder="/static/images/piercings/example.jpg">
            </div>
            <div class="flex items-end pb-1">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="is_active" value="1" checked
                           class="w-4 h-4 accent-bryt-pink">
                    <span class="text-sm text-bryt-silver">Active</span>
                </label>
            </div>
        </div>

        <div class="flex gap-3">
            <button type="submit"
                    class="px-5 py-2 bg-bryt-pink text-bryt-black text-xs tracking-wider uppercase hover:bg-bryt-blush transition-colors">
                Add Service
            </button>
            <button type="button"
                    onclick="document.getElementById('newServiceZone').innerHTML=''"
                    class="px-5 py-2 border border-bryt-charcoal text-bryt-gray text-xs tracking-wider uppercase hover:text-bryt-silver transition-colors">
                Cancel
            </button>
        </div>
    </form>
</div>
