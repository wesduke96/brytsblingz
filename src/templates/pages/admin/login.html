{% extends "base.html" %}

{% block content %}
<section class="min-h-[80vh] flex items-center justify-center px-6">
    <div class="w-full max-w-sm">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="inline-block">
                <span class="font-script text-4xl text-bryt-white">Bryt's Blingz</span>
                <span class="block text-xs tracking-[0.3em] uppercase text-bryt-silver mt-1">Admin Portal</span>
            </a>
        </div>
        
        <!-- Login Card -->
        <div class="border border-bryt-charcoal bg-bryt-charcoal/20 p-8">
            <h1 class="text-xl text-bryt-white text-center mb-6">Sign In</h1>
            
            {% if error %}
            <div class="mb-6 p-3 border border-red-500/50 bg-red-900/20 text-center">
                <p class="text-red-400 text-sm">{{ error }}</p>
            </div>
            {% endif %}
            
            <form method="POST" action="/admin/login" class="space-y-6">
                <div>
                    <label class="block text-sm text-bryt-silver mb-2" for="password">Password</label>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           required
                           autofocus
                           class="w-full px-4 py-3 bg-bryt-black border border-bryt-charcoal text-bryt-white placeholder-bryt-gray focus:border-bryt-pink focus:outline-none transition-colors"
                           placeholder="Enter admin password">
                </div>
                
                <button type="submit"
                        class="w-full px-6 py-3 bg-bryt-pink text-bryt-black text-sm tracking-widest uppercase hover:bg-bryt-blush transition-colors">
                    Sign In
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <a href="/" class="text-xs text-bryt-gray hover:text-bryt-silver transition-colors">
                    &larr; Back to website
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
